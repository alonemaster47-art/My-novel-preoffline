<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinese Novel Reader</title>
    <style>
        :root {
            --bg-body: #e0e0e0; /* สีพื้นหลังด้านนอกหน้ากระดาษ */
            --bg-paper: #ffffff; /* สีของหน้ากระดาษ */
            --text-color: #2c3e50;
            --accent-color: #8e44ad;
            --panel-bg: #ffffff;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-body); /* เปลี่ยนสีพื้นหลังให้ตัดกับกระดาษ */
            color: var(--text-color);
            font-family: "Times New Roman","Noto Sans Thai", serif;
            line-height: 1.8;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* เมนูควบคุมด้านบนแบบ Smart Hide */
        .controls {
            position: fixed;
            top: 0;
            display: flex; gap: 10px;
            background: rgba(255, 255, 255, 0.98);
            padding: 10px 30px;
            border-bottom: 1px solid #ddd;
            width: 100%;
            justify-content: center;
            box-sizing: border-box;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .controls.hidden { transform: translateY(-100%); }

        /* ส่วนตั้งค่าขนาดอักษรและระยะบรรทัดที่เพิ่มเข้ามา */
        .setting-group { display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: bold; color: #666; }
        .setting-group input { width: 45px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }

        /* ส่วนคอนเทนเนอร์หลักที่ทำให้เหมือนหน้ากระดาษ */
        #container { 
            width: 90%; 
            max-width: 1000px; 
            margin-top: 80px; /* เว้นที่ให้แถบเมนู */
            margin-bottom: 50px;
            background-color: var(--bg-paper); /* สีขาวหน้ากระดาษ */
            padding: 60px 80px; /* ขอบกระดาษด้านใน */
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); /* เงาตกกระทบให้ดูมีมิติ */
            border-radius: 4px; /* มุมโค้งมนเล็กน้อยแบบกระดาษ */
            box-sizing: border-box;
            min-height: 1000px;
        }

        #content { font-size: 19px; white-space: pre-wrap; word-wrap: break-word; color: #333; }
        #chapter-title { border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 30px; }

        /* ปรับปรุงปุ่มกดให้ดูโมเดิร์นขึ้นตามภาพ */
        button { 
            padding: 8px 18px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            background: white; 
            color: #444; 
            cursor: pointer; 
            font-size: 14px; 
            transition: all 0.2s;
        }
        button:hover { background: #f5f5f5; border-color: #bbb; }
        .btn-accent { background: var(--accent-color); color: white; border: none; }
        .btn-accent:hover { opacity: 0.9; background: var(--accent-color); }
        .btn-danger { color: #c0392b; border-color: #fab1a0; }
        .btn-danger:hover { background: #fff5f5; }

        /* Modal Styles */
        .modal {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: var(--panel-bg);
            padding: 25px; box-shadow: 0 0 30px rgba(0,0,0,0.3);
            border-radius: 12px; z-index: 1000; width: 400px; max-height: 85vh; overflow-y: auto;
            scroll-behavior: smooth; /* เพิ่มเพื่อให้การเลื่อนนุ่มนวล */
        }

        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 999;
        }

        .vocab-item { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .vocab-item input { width: 100%; padding: 6px; border: 1px solid #ddd; border-radius: 4px; }
        .no-translate { translate: no; }
        .translated-word { color: inherit; font-weight: inherit; cursor: pointer; border-bottom: 1px dashed transparent; }
        .translated-word:hover { border-bottom-color: #ccc; }
        #toc-list div { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; }
        #toc-list div:hover { background: #f9f9f9; }
        .active-chapter { background: #f0f7ff; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

<div class="controls" id="main-controls">
    <div style="display: flex; align-items: center; gap: 15px;">
        <input type="file" id="fileInput" accept=".txt" style="font-size: 12px; width: 150px;">
        
        <!-- ส่วนปรับแต่งขนาดอักษรและระยะบรรทัด -->
        <div class="setting-group">
            ขนาด: <input type="number" id="fontSizeInput" value="19" min="12" max="50">
        </div>
        <div class="setting-group">
            ระยะบรรทัด: <input type="number" id="lineHeightInput" value="1.8" step="0.1" min="1" max="4">
        </div>

        <button onclick="showTOC()">สารบัญ</button>
        <button onclick="prevChapter()">ก่อนหน้า (←)</button>
        <button onclick="nextChapter()">ถัดไป (→)</button>
        <button onclick="showVocab()" class="btn-accent">คลังคำศัพท์</button>
        <button onclick="clearVocab()" class="btn-danger">ล้างคลัง</button>
    </div>
</div>

<div id="container">
    <h2 id="chapter-title">กรุณาอัพโหลดไฟล์นิยาย</h2>
    <div id="content">เมื่อเลือกไฟล์แล้ว เนื้อหาจะแสดงที่นี่...</div>
</div>

<div class="overlay" id="overlay" onclick="closeAndSaveVocab()"></div>

<!-- Modal คลังคำศัพท์ -->
<div class="modal" id="vocab-storage-modal">
    <h3 style="text-align: center; margin-top: 0;">คลังคำศัพท์</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; font-weight: bold; font-size: 13px; margin-bottom: 10px; color: #666;">
        <span>ต้นฉบับ (จีน)</span>
        <span>คำแปล (ไทย)</span>
        <span>ลบ</span>
    </div>
    <div id="vocab-list"></div>
    <div style="margin-top: 20px;"><button onclick="closeAndSaveVocab()" class="btn-accent" style="width: 100%; padding: 12px;">บันทึกและปิด</button></div>
</div>

<!-- Modal สารบัญ -->
<div class="modal" id="toc-modal"><h3>สารบัญ</h3><div id="toc-list"></div></div>

<!-- Modal เพิ่มคำศัพท์ด่วน -->
<div class="modal" id="quick-edit-modal">
    <h3 style="margin-top: 0;">เพิ่มคำศัพท์ใหม่</h3>
    <div style="text-align: left; margin-bottom: 10px;">
        <label style="font-size: 12px;">ต้นฉบับ:</label>
        <input type="text" id="quick-orig" class="no-translate" translate="no" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
    </div>
    <div style="text-align: left; margin-bottom: 15px;">
        <label style="font-size: 12px;">คำแปล:</label>
        <input type="text" id="quick-trans" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
    </div>
    <div style="display: flex; gap: 10px;">
        <button onclick="saveQuickVocab()" class="btn-accent" style="flex: 1;">บันทึก</button>
        <button onclick="closeModals()" style="background: #7f8c8d; color: white; flex: 1;">ยกเลิก</button>
    </div>
</div>

<script>
    let chapters = [];
    let currentChapterIndex = 0;
    let fileName = "";
    let vocabulary = JSON.parse(localStorage.getItem('novel_vocab') || '{}');
    let lastScrollTop = 0;

    // ระบบตรวจจับปุ่มบนแป้นพิมพ์ (Keyboard Navigation)
    document.addEventListener('keydown', function(e) {
        // ไม่ทำงานถ้ากำลังพิมพ์อยู่ในช่อง input
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

        if (e.key === 'ArrowRight') {
            nextChapter();
        } else if (e.key === 'ArrowLeft') {
            prevChapter();
        }
    });

    // ระบบปรับขนาดอักษรและระยะบรรทัดแบบ Real-time
    const contentDisplay = document.getElementById('content');
    const fontSizeInput = document.getElementById('fontSizeInput');
    const lineHeightInput = document.getElementById('lineHeightInput');

    fontSizeInput.addEventListener('input', (e) => {
        contentDisplay.style.fontSize = e.target.value + 'px';
        localStorage.setItem('reader_font_size', e.target.value);
    });

    lineHeightInput.addEventListener('input', (e) => {
        contentDisplay.style.lineHeight = e.target.value;
        localStorage.setItem('reader_line_height', e.target.value);
    });

    // โหลดค่าที่เคยตั้งไว้จาก LocalStorage
    if(localStorage.getItem('reader_font_size')) {
        const fs = localStorage.getItem('reader_font_size');
        fontSizeInput.value = fs;
        contentDisplay.style.fontSize = fs + 'px';
    }
    if(localStorage.getItem('reader_line_height')) {
        const lh = localStorage.getItem('reader_line_height');
        lineHeightInput.value = lh;
        contentDisplay.style.lineHeight = lh;
    }

    // ระบบซ่อน/แสดงแถบควบคุม
    window.addEventListener("scroll", function() {
        let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        const controls = document.getElementById("main-controls");
        if (scrollTop > lastScrollTop && scrollTop > 100) {
            controls.classList.add("hidden");
        } else {
            controls.classList.remove("hidden");
        }
        lastScrollTop = scrollTop;
    });

    const fileInput = document.getElementById('fileInput');

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        fileName = file.name;
        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            const chapterRegex = /\n(?=(?:第?\s*[\d\u4e00-\u9fa5]+\s*[章节])|(?:\n\d{1,4}\s*\n))/g;
            chapters = text.split(chapterRegex).filter(c => c.trim().length > 0);
            checkHistory();
            renderChapter();
        };
        reader.readAsText(file);
    });

    function renderChapter() {
        if (chapters.length === 0) return;
        let text = chapters[currentChapterIndex];
        const sortedKeys = Object.keys(vocabulary).sort((a, b) => b.length - a.length);
        sortedKeys.forEach(orig => {
            if (!orig) return;
            const reg = new RegExp(orig, 'g');
            text = text.replace(reg, `<span class="translated-word no-translate" translate="no" onclick="openQuickEdit('${orig}')">${vocabulary[orig]}</span>`);
        });
        document.getElementById('chapter-title').innerText = `ตอนที่ ${currentChapterIndex + 1}`;
        contentDisplay.innerHTML = text;
        window.scrollTo(0, 0);
        saveHistory();
    }

    function showVocab() {
        const list = document.getElementById('vocab-list');
        list.innerHTML = "";
        for (let key in vocabulary) {
            const item = document.createElement('div');
            item.className = "vocab-item";
            item.innerHTML = `
                <input type="text" class="no-translate vocab-key" translate="no" value="${key}">
                <input type="text" class="vocab-val" value="${vocabulary[key]}">
                <button onclick="deleteVocabItem(this)" style="background:#ff7675; color:white; border:none; padding: 5px 10px;">X</button>`;
            list.appendChild(item);
        }
        document.getElementById('vocab-storage-modal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeAndSaveVocab() {
        const items = document.querySelectorAll('.vocab-item');
        const newVocab = {};
        items.forEach(item => {
            const k = item.querySelector('.vocab-key').value.trim();
            const v = item.querySelector('.vocab-val').value.trim();
            if (k && v) newVocab[k] = v;
        });
        vocabulary = newVocab;
        localStorage.setItem('novel_vocab', JSON.stringify(vocabulary));
        renderChapter();
        closeModals();
    }

    function deleteVocabItem(btn) { btn.parentElement.remove(); }

    contentDisplay.addEventListener('mouseup', function() {
        const selected = window.getSelection().toString().trim();
        if (selected && selected.length < 50) openQuickEdit(selected);
    });

    function openQuickEdit(orig) {
        document.getElementById('quick-orig').value = orig;
        document.getElementById('quick-trans').value = vocabulary[orig] || "";
        document.getElementById('quick-edit-modal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function saveQuickVocab() {
        const o = document.getElementById('quick-orig').value.trim();
        const t = document.getElementById('quick-trans').value.trim();
        if (o && t) {
            vocabulary[o] = t;
            localStorage.setItem('novel_vocab', JSON.stringify(vocabulary));
            renderChapter();
            closeModals();
        }
    }

    function nextChapter() { if (currentChapterIndex < chapters.length - 1) { currentChapterIndex++; renderChapter(); } }
    function prevChapter() { if (currentChapterIndex > 0) { currentChapterIndex--; renderChapter(); } }
    
    function showTOC() {
        const tocList = document.getElementById('toc-list');
        const tocModal = document.getElementById('toc-modal');
        tocList.innerHTML = "";
        let activeDiv = null;

        chapters.forEach((ch, index) => {
            const div = document.createElement('div');
            div.innerText = `ตอนที่ ${index + 1} - ${ch.substring(0, 25).replace(/\n/g, ' ')}...`;
            if (index === currentChapterIndex) {
                div.className = "active-chapter";
                activeDiv = div; // เก็บอ้างอิงของตอนปัจจุบันไว้
            }
            div.onclick = () => { currentChapterIndex = index; renderChapter(); closeModals(); };
            tocList.appendChild(div);
        });

        tocModal.style.display = 'block';
        document.getElementById('overlay').style.display = 'block';

        // ส่วนที่เพิ่ม: เลื่อนไปยังตอนปัจจุบันในหน้าต่างสารบัญ
        if (activeDiv) {
            setTimeout(() => {
                activeDiv.scrollIntoView({ behavior: 'auto', block: 'center' });
            }, 10);
        }
    }

    function clearVocab() { if (confirm("ล้างคลังศัพท์?")) { vocabulary = {}; localStorage.removeItem('novel_vocab'); renderChapter(); } }
    function saveHistory() { localStorage.setItem('read_history_' + fileName, JSON.stringify({ index: currentChapterIndex, timestamp: new Date().getTime() })); }
    function checkHistory() {
        const history = JSON.parse(localStorage.getItem('read_history_' + fileName) || 'null');
        if (history && (new Date().getTime() - history.timestamp < 86400000)) currentChapterIndex = history.index;
    }
    function closeModals() { document.querySelectorAll('.modal, .overlay').forEach(el => el.style.display = 'none'); }
</script>
</body>
</html>
