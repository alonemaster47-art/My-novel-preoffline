<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Language Novel Reader</title>
    <style>
        :root { --bg-color: #f4f1ea; --text-color: #2c3e50; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Tahoma, 'Noto Sans Thai','PingFang SC', 'Microsoft YaHei', sans-serif; line-height: 1.8; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        #controls { position: fixed; top: 0; width: 100%; background: #fff; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: center; gap: 10px; z-index: 100; flex-wrap: wrap; }
        
        #reader-container { max-width: 800px; width: 90%; margin-top: 130px; margin-bottom: 50px; padding: 30px; background: white; min-height: 80vh; }
        
        p { margin-bottom: 1.5em; text-indent: 2em; cursor: help; font-size: 1.1em; }
        p:hover { background: #fdfae1; }
        
        /* Modal Styles */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.3); display: none; z-index: 1000; width: 320px; }
        
        /* Dictionary List Style */
        #dict-modal { width: 450px; max-height: 70vh; overflow-y: auto; }
        .dict-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; gap: 5px; }
        .dict-item input { padding: 4px; border: 1px solid #ddd; border-radius: 4px; width: 110px; }
        
        #toc-menu { position: fixed; right: 20px; top: 130px; background: white; border: 1px solid #ccc; max-height: 60vh; overflow-y: auto; width: 250px; display: none; padding: 10px; box-shadow: -2px 2px 10px rgba(0,0,0,0.1); z-index: 99; scroll-behavior: smooth; }
        
        .toc-item { cursor: pointer; padding: 8px; border-bottom: 1px solid #eee; font-size: 0.9em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .toc-item.active { background-color: #e3f2fd; font-weight: bold; border-left: 4px solid #1976d2; }
        
        button { padding: 8px 15px; cursor: pointer; border-radius: 5px; border: 1px solid #ddd; background: #fff; transition: 0.2s; }
        button:hover { background: #f0f0f0; }
        .danger-btn { background: #fff5f5; color: #c0392b; border-color: #fb8c8c; }
        .primary-btn { background: #e3f2fd; border-color: #90caf9; color: #1976d2; }
    </style>
</head>
<body>

<div id="controls">
    <input type="file" id="fileInput" accept=".txt">
    <button onclick="toggleTOC()">📖 สารบัญ</button>
    <button onclick="changeChapter(-1)">ก่อนหน้า (←)</button>
    <button onclick="changeChapter(1)">ถัดไป (→)</button>
    <button class="primary-btn" onclick="openDictModal()">🗂️ คลังคำศัพท์</button>
    <button class="danger-btn" onclick="clearDictionary()">🗑️ ล้างทั้งหมด</button>
</div>

<div id="edit-modal" class="modal">
    <h4>แก้ไขคำศัพท์ (ชั่วคราว)</h4>
    <label style="font-size: 0.8em;">คำต้นฉบับ:</label>
    <input type="text" id="originalWord" readonly style="width: 100%; margin-bottom: 10px; background: #f9f9f9;">
    <label style="font-size: 0.8em;">เปลี่ยนเป็น:</label>
    <input type="text" id="replaceWith" placeholder="เปลี่ยนเป็น..." style="width: 100%; margin-bottom: 15px;">
    <div style="display: flex; gap: 10px;">
        <button onclick="saveWord()" style="flex: 1; background: #2ecc71; color: white;">ตกลง</button>
        <button onclick="closeModal('edit-modal')" style="flex: 1;">ยกเลิก</button>
    </div>
</div>

<div id="dict-modal" class="modal">
    <h3 style="margin-top: 0;">🗂️ คลังคำศัพท์ที่แก้ไขแล้ว</h3>
    <div id="dict-list-container" style="margin-bottom: 15px;"></div>
    <div style="text-align: right;">
        <button onclick="closeModal('dict-modal')">ปิดหน้าต่าง</button>
    </div>
</div>

<div id="toc-menu"></div>

<div id="reader-container">
    <div id="content-display">
        <h2 style="text-align: center;">กรุณาเลือกไฟล์นิยาย (.txt)</h2>
        <p style="text-align: center;">รองรับภาษาไทย อังกฤษ และจีน (第...章)</p>
    </div>
</div>

<script>
    let rawChapters = []; 
    let currentChapterIndex = 0;
    let customDict = {}; 
    let currentFileName = "";

    // 1. เพิ่มการควบคุมด้วยปุ่มลูกศร
    document.addEventListener('keydown', function(e) {
        if (rawChapters.length === 0) return;
        if (e.key === "ArrowRight") changeChapter(1);
        if (e.key === "ArrowLeft") changeChapter(-1);
    });

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        currentFileName = file.name;
        const reader = new FileReader();
        reader.onload = (content) => {
            const text = content.target.result;
            const chapterRegex = /(?=Chapter|บทที่|第[0-9一二三四五六七八九十百千]+[章节回]|\n{2,}(?=[^\n]{1,20}\n))/i;
            rawChapters = text.split(chapterRegex).filter(c => c.trim().length > 10);
            
            if (rawChapters.length <= 1) {
                rawChapters = text.split(/\n{3,}/).filter(c => c.trim().length > 0);
            }

            buildTOC();
            
            // 3. ตรวจสอบบันทึกหน้าเก่า (ถ้าไม่เกิน 1 วัน)
            const savedData = getSavedProgress(currentFileName);
            if (savedData !== null) {
                renderChapter(savedData);
            } else {
                renderChapter(0);
            }
        };
        reader.readAsText(file);
    });

    function renderChapter(index) {
        if (index < 0 || index >= rawChapters.length) return;
        currentChapterIndex = index;
        
        // บันทึกความคืบหน้า
        saveProgress(currentFileName, index);

        const display = document.getElementById('content-display');
        let content = rawChapters[index].trim();
        
        const sortedKeys = Object.keys(customDict).sort((a, b) => b.length - a.length);
        for (const oldWord of sortedKeys) {
            const regex = new RegExp(escapeRegExp(oldWord), 'g');
            content = content.replace(regex, customDict[oldWord]);
        }

        const lines = content.split('\n').map(line => {
            if(!line.trim()) return "";
            return `<p onclick="handleParaClick(event)">${line.trim()}</p>`;
        }).join('');

        display.innerHTML = `<h2>บทที่ ${index + 1}</h2>` + lines;
        window.scrollTo(0,0);
        
        // อัปเดตสถานะในสารบัญ
        updateTOCActiveState();
    }

    // ฟังก์ชันจัดการ LocalStorage พร้อมระบบหมดอายุ 1 วัน
    function saveProgress(fileName, index) {
        const data = {
            index: index,
            timestamp: new Date().getTime()
        };
        localStorage.setItem('read_progress_' + fileName, JSON.stringify(data));
    }

    function getSavedProgress(fileName) {
        const dataStr = localStorage.getItem('read_progress_' + fileName);
        if (!dataStr) return null;

        const data = JSON.parse(dataStr);
        const now = new Date().getTime();
        const oneDay = 24 * 60 * 60 * 1000;

        if (now - data.timestamp > oneDay) {
            localStorage.removeItem('read_progress_' + fileName); // ลบถ้าเกิน 1 วัน
            return null;
        }
        return data.index;
    }

    function toggleTOC() { 
        const m = document.getElementById('toc-menu'); 
        const isOpening = m.style.display !== 'block';
        m.style.display = isOpening ? 'block' : 'none'; 
        
        // 2. เมื่อเปิดสารบัญ ให้เลื่อนไปหาบทปัจจุบัน
        if (isOpening) {
            setTimeout(() => {
                const activeItem = document.querySelector('.toc-item.active');
                if (activeItem) {
                    activeItem.scrollIntoView({ block: 'center' });
                }
            }, 10);
        }
    }

    function buildTOC() {
        const toc = document.getElementById('toc-menu');
        toc.innerHTML = '<h3>รายชื่อบท</h3>';
        rawChapters.forEach((ch, i) => {
            const title = ch.substring(0, 20).replace(/\n/g, ' ').trim();
            const d = document.createElement('div');
            d.className = 'toc-item';
            d.id = `toc-ch-${i}`;
            d.innerText = `${i + 1}. ${title}...`;
            d.onclick = () => { renderChapter(i); toggleTOC(); };
            toc.appendChild(d);
        });
        updateTOCActiveState();
    }

    function updateTOCActiveState() {
        document.querySelectorAll('.toc-item').forEach((item, idx) => {
            if (idx === currentChapterIndex) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
    }

    // --- ฟังก์ชันเสริมเดิม (คงไว้ทั้งหมด) ---
    function handleParaClick(e) {
        const selectedText = window.getSelection().toString().trim();
        if (selectedText) {
            document.getElementById('originalWord').value = selectedText;
            document.getElementById('replaceWith').value = customDict[selectedText] || selectedText;
            document.getElementById('edit-modal').style.display = 'block';
        }
    }

    function saveWord() {
        const oldW = document.getElementById('originalWord').value;
        const newW = document.getElementById('replaceWith').value;
        if (oldW) {
            customDict[oldW] = newW;
            closeModal('edit-modal');
            renderChapter(currentChapterIndex);
        }
    }

    function openDictModal() {
        const container = document.getElementById('dict-list-container');
        container.innerHTML = '';
        const keys = Object.keys(customDict);
        if (keys.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:gray;">ยังไม่มีการแก้ไขคำศัพท์</p>';
        } else {
            keys.forEach(oldWord => {
                const div = document.createElement('div');
                div.className = 'dict-item';
                div.innerHTML = `<span style="font-size:0.9em; flex:1; overflow:hidden;"><b>${oldWord}</b></span><span>➡️</span><input type="text" value="${customDict[oldWord]}" onchange="updateDictWord('${oldWord}', this.value)"><button class="danger-btn" onclick="deleteDictWord('${oldWord}')" style="padding:2px 8px;">✕</button>`;
                container.appendChild(div);
            });
        }
        document.getElementById('dict-modal').style.display = 'block';
    }

    function updateDictWord(oldWord, newValue) {
        if (newValue.trim() === "") deleteDictWord(oldWord);
        else { customDict[oldWord] = newValue; renderChapter(currentChapterIndex); }
    }

    function deleteDictWord(oldWord) {
        delete customDict[oldWord];
        openDictModal();
        renderChapter(currentChapterIndex);
    }

    function clearDictionary() {
        if(confirm("ล้างการแก้ไขคำศัพท์ทั้งหมดหรือไม่?")) {
            customDict = {};
            renderChapter(currentChapterIndex);
            if(document.getElementById('dict-modal').style.display === 'block') openDictModal();
        }
    }

    function escapeRegExp(string) { return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function changeChapter(step) { renderChapter(currentChapterIndex + step); }
</script>
</body>
</html>
