<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Language Novel Reader (Full Restore)</title>
    <style>
        :root { --bg-color: #f4f1ea; --text-color: #2c3e50; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Tahoma, 'Noto Sans Thai','PingFang SC', sans-serif; line-height: 1.8; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #controls { position: fixed; top: 0; width: 100%; background: #fff; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: center; gap: 10px; z-index: 100; flex-wrap: wrap; }
        #reader-container { max-width: 800px; width: 90%; margin-top: 130px; margin-bottom: 50px; padding: 30px; background: white; min-height: 80vh; }
        p { margin-bottom: 1.5em; text-indent: 2em; cursor: help; font-size: 1.1em; }
        p:hover { background: #fdfae1; }
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.3); display: none; z-index: 1000; width: 320px; }
        #dict-modal { width: 450px; max-height: 70vh; overflow-y: auto; }
        .dict-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; gap: 5px; }
        .dict-item input { padding: 4px; border: 1px solid #ddd; border-radius: 4px; width: 110px; }
        #toc-menu { position: fixed; right: 20px; top: 130px; background: white; border: 1px solid #ccc; max-height: 60vh; overflow-y: auto; width: 250px; display: none; padding: 10px; box-shadow: -2px 2px 10px rgba(0,0,0,0.1); z-index: 99; scroll-behavior: smooth; }
        .toc-item { cursor: pointer; padding: 8px; border-bottom: 1px solid #eee; font-size: 0.9em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .toc-item.active { background-color: #e3f2fd; font-weight: bold; border-left: 4px solid #1976d2; }
        button { padding: 8px 15px; cursor: pointer; border-radius: 5px; border: 1px solid #ddd; background: #fff; transition: 0.2s; }
        button:hover { background: #f0f0f0; }
        .danger-btn { background: #fff5f5; color: #c0392b; border-color: #fb8c8c; }
        .primary-btn { background: #e3f2fd; border-color: #90caf9; color: #1976d2; }
        .original-preview { background: #f8f9fa; padding: 10px; border-radius: 4px; font-size: 0.85em; color: #d35400; margin-bottom: 10px; border-left: 3px solid #e67e22; word-break: break-all; }
    </style>
</head>
<body>

<div id="controls">
    <input type="file" id="fileInput" accept=".txt">
    <button onclick="toggleTOC()">📖 สารบัญ</button>
    <button onclick="changeChapter(-1)">ก่อนหน้า (←)</button>
    <button onclick="changeChapter(1)">ถัดไป (→)</button>
    <button class="primary-btn" onclick="openDictModal()">🗂️ คลังคำศัพท์</button>
    <button class="danger-btn" onclick="clearDictionary()">🗑️ ล้างทั้งหมด</button>
</div>

<div id="edit-modal" class="modal">
    <h4 style="margin-top:0">🔧 แก้ไขคำศัพท์</h4>
    <div id="rawPreview" class="original-preview"></div>
    <label style="font-size: 0.8em;">คำจีนต้นฉบับ:</label>
    <input type="text" id="originalWord" style="width: 100%; margin-bottom: 10px; padding: 5px; box-sizing: border-box;">
    <label style="font-size: 0.8em;">เปลี่ยนเป็นไทย:</label>
    <input type="text" id="replaceWith" placeholder="คำแปล..." style="width: 100%; margin-bottom: 15px; padding: 5px; box-sizing: border-box;">
    <div style="display: flex; gap: 10px;">
        <button onclick="saveWord()" style="flex: 1; background: #2ecc71; color: white; border:none;">ตกลง</button>
        <button onclick="closeModal('edit-modal')" style="flex: 1;">ยกเลิก</button>
    </div>
</div>

<div id="dict-modal" class="modal">
    <h3 style="margin-top: 0;">🗂️ คลังคำศัพท์</h3>
    <div id="dict-list-container"></div>
    <div style="text-align: right; margin-top: 15px;">
        <button onclick="closeModal('dict-modal')">ปิดหน้าต่าง</button>
    </div>
</div>

<div id="toc-menu"></div>

<div id="reader-container">
    <div id="content-display">
        <h2 style="text-align: center;">กรุณาเลือกไฟล์นิยาย (.txt)</h2>
    </div>
</div>

<script>
    let rawChapters = []; 
    let currentChapterIndex = 0;
    let customDict = JSON.parse(localStorage.getItem('novel_dict_v3') || '{}'); 
    let currentFileName = "";

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        currentFileName = file.name;
        const reader = new FileReader();
        reader.onload = (content) => {
            const text = content.target.result;
            const chapterRegex = /(?=Chapter|บทที่|第[0-9一二三四五六七八九十百千]+[章节回]|\n{2,}(?=[^\n]{1,20}\n))/i;
            rawChapters = text.split(chapterRegex).filter(c => c.trim().length > 10);
            buildTOC();
            renderChapter(0);
        };
        reader.readAsText(file);
    });

    function renderChapter(index) {
        if (index < 0 || index >= rawChapters.length) return;
        currentChapterIndex = index;
        const display = document.getElementById('content-display');
        let lines = rawChapters[index].trim().split('\n');
        
        const sortedKeys = Object.keys(customDict).sort((a, b) => b.length - a.length);

        const htmlLines = lines.map(line => {
            if(!line.trim()) return "";
            let originalRaw = line.trim();
            let translatedLine = originalRaw;

            for (const oldWord of sortedKeys) {
                const regex = new RegExp(escapeRegExp(oldWord), 'g');
                translatedLine = translatedLine.replace(regex, customDict[oldWord]);
            }
            // เก็บต้นฉบับไว้ใน data-raw เพื่อให้คลิกแล้วดึงกลับมาได้แม้จะแปลไทยไปแล้ว
            return `<p onclick="handleParaClick(this)" data-raw="${encodeURIComponent(originalRaw)}">${translatedLine}</p>`;
        }).join('');

        display.innerHTML = `<h2>บทที่ ${index + 1}</h2>` + htmlLines;
        window.scrollTo(0,0);
        updateTOCActiveState();
    }

    function handleParaClick(el) {
        const selectedText = window.getSelection().toString().trim();
        const rawText = decodeURIComponent(el.getAttribute('data-raw'));
        
        document.getElementById('rawPreview').innerText = "ต้นฉบับ: " + rawText;
        
        // ถ้าสิ่งที่คลุมดำเป็นภาษาจีน ให้ใส่ในช่องเลย
        if (/[\u4E00-\u9FA5]/.test(selectedText)) {
            document.getElementById('originalWord').value = selectedText;
        } else {
            document.getElementById('originalWord').value = "";
            document.getElementById('originalWord').placeholder = "ก๊อปคำจีนจากด้านบนวางที่นี่";
        }
        
        document.getElementById('replaceWith').value = customDict[document.getElementById('originalWord').value] || "";
        document.getElementById('edit-modal').style.display = 'block';
    }

    function saveWord() {
        const oldW = document.getElementById('originalWord').value.trim();
        const newW = document.getElementById('replaceWith').value.trim();
        if (oldW) {
            customDict[oldW] = newW;
            localStorage.setItem('novel_dict_v3', JSON.stringify(customDict));
            closeModal('edit-modal');
            renderChapter(currentChapterIndex);
        }
    }

    // --- ฟังก์ชันเสริม (คงโครงสร้างเดิม) ---
    function buildTOC() {
        const toc = document.getElementById('toc-menu');
        toc.innerHTML = '<h3>รายชื่อบท</h3>';
        rawChapters.forEach((ch, i) => {
            const title = ch.substring(0, 20).replace(/\n/g, ' ').trim();
            const d = document.createElement('div');
            d.className = 'toc-item';
            d.id = `toc-ch-${i}`;
            d.innerText = `${i + 1}. ${title}...`;
            d.onclick = () => { renderChapter(i); toggleTOC(); };
            toc.appendChild(d);
        });
    }

    function updateTOCActiveState() {
        document.querySelectorAll('.toc-item').forEach((item, idx) => {
            item.classList.toggle('active', idx === currentChapterIndex);
        });
    }

    function toggleTOC() { 
        const m = document.getElementById('toc-menu'); 
        m.style.display = m.style.display === 'block' ? 'none' : 'block'; 
    }

    function openDictModal() {
        const container = document.getElementById('dict-list-container');
        container.innerHTML = '';
        const keys = Object.keys(customDict);
        if (keys.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:gray;">ยังไม่มีข้อมูล</p>';
        } else {
            keys.forEach(k => {
                const div = document.createElement('div');
                div.className = 'dict-item';
                div.innerHTML = `<span style="font-size:0.8em; flex:1;"><b>${k}</b></span><span>➡️</span><input type="text" value="${customDict[k]}" onchange="updateDict('${k}', this.value)"><button onclick="deleteDict('${k}')">✕</button>`;
                container.appendChild(div);
            });
        }
        document.getElementById('dict-modal').style.display = 'block';
    }

    function updateDict(k, v) { customDict[k] = v; localStorage.setItem('novel_dict_v3', JSON.stringify(customDict)); renderChapter(currentChapterIndex); }
    function deleteDict(k) { delete customDict[k]; localStorage.setItem('novel_dict_v3', JSON.stringify(customDict)); openDictModal(); renderChapter(currentChapterIndex); }
    function clearDictionary() { if(confirm("ล้างทั้งหมด?")) { customDict = {}; localStorage.removeItem('novel_dict_v3'); renderChapter(currentChapterIndex); } }
    function escapeRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function changeChapter(step) { renderChapter(currentChapterIndex + step); }
</script>
</body>
</html>
