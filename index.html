<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Language Novel Reader (Smart Fix)</title>
    <style>
        :root { --bg-color: #f4f1ea; --text-color: #2c3e50; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Tahoma, 'Noto Sans Thai','PingFang SC', 'Microsoft YaHei', sans-serif; line-height: 1.8; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #controls { position: fixed; top: 0; width: 100%; background: #fff; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: center; gap: 10px; z-index: 100; flex-wrap: wrap; }
        #reader-container { max-width: 800px; width: 90%; margin-top: 130px; margin-bottom: 50px; padding: 30px; background: white; min-height: 80vh; }
        p { margin-bottom: 1.5em; text-indent: 2em; cursor: help; font-size: 1.1em; position: relative; }
        p:hover { background: #fdfae1; }
        
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.3); display: none; z-index: 1000; width: 350px; }
        #dict-modal { width: 450px; max-height: 70vh; overflow-y: auto; }
        .dict-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; gap: 5px; }
        .dict-item input { padding: 4px; border: 1px solid #ddd; border-radius: 4px; width: 110px; }
        #toc-menu { position: fixed; right: 20px; top: 130px; background: white; border: 1px solid #ccc; max-height: 60vh; overflow-y: auto; width: 250px; display: none; padding: 10px; box-shadow: -2px 2px 10px rgba(0,0,0,0.1); z-index: 99; }
        .toc-item { cursor: pointer; padding: 8px; border-bottom: 1px solid #eee; font-size: 0.9em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .toc-item.active { background-color: #e3f2fd; font-weight: bold; border-left: 4px solid #1976d2; }
        button { padding: 8px 15px; cursor: pointer; border-radius: 5px; border: 1px solid #ddd; background: #fff; }
        .danger-btn { background: #fff5f5; color: #c0392b; border-color: #fb8c8c; }
        .primary-btn { background: #e3f2fd; border-color: #90caf9; color: #1976d2; }

        /* ส่วนสำคัญ: ซ่อนต้นฉบับจีนไม่ให้ Google Translate เห็นแต่ให้ JS เข้าถึงได้ */
        .raw-data { display: none; visibility: hidden; pointer-events: none; }
    </style>
</head>
<body>

<div id="controls">
    <input type="file" id="fileInput" accept=".txt">
    <button onclick="toggleTOC()">📖 สารบัญ</button>
    <button onclick="changeChapter(-1)">ก่อนหน้า (←)</button>
    <button onclick="changeChapter(1)">ถัดไป (→)</button>
    <button class="primary-btn" onclick="openDictModal()">🗂️ คลังคำศัพท์</button>
    <button class="danger-btn" onclick="clearDictionary()">🗑️ ล้างทั้งหมด</button>
</div>

<div id="edit-modal" class="modal">
    <h4 style="margin-top:0">🔧 แก้ไขคำศัพท์</h4>
    <p style="font-size: 0.8em; margin: 0; color: #666; text-indent: 0;">คำจีนที่ตรวจพบในบริเวณนี้:</p>
    <input type="text" id="originalWord" style="width: 93%; margin-bottom: 10px; padding: 8px; font-weight: bold; color: #d35400;">
    
    <p style="font-size: 0.8em; margin: 0; color: #666; text-indent: 0;">คำแปลที่ต้องการ:</p>
    <input type="text" id="replaceWith" placeholder="ใส่คำแปลไทย..." style="width: 93%; margin-bottom: 15px; padding: 8px;">
    
    <div style="display: flex; gap: 10px;">
        <button onclick="saveWord()" style="flex: 1; background: #2ecc71; color: white; border: none; padding: 10px;">ตกลง</button>
        <button onclick="closeModal('edit-modal')" style="flex: 1; padding: 10px;">ยกเลิก</button>
    </div>
</div>

<div id="dict-modal" class="modal">
    <h3 style="margin-top: 0;">🗂️ คลังคำศัพท์ที่บันทึก</h3>
    <div id="dict-list-container"></div>
    <div style="text-align: right; margin-top: 15px;">
        <button onclick="closeModal('dict-modal')">ปิด</button>
    </div>
</div>

<div id="toc-menu"></div>

<div id="reader-container">
    <div id="content-display">
        <h2 style="text-align: center;">กรุณาเลือกไฟล์นิยาย (.txt)</h2>
    </div>
</div>

<script>
    let rawChapters = []; 
    let currentChapterIndex = 0;
    let customDict = JSON.parse(localStorage.getItem('novel_dict') || '{}'); 
    let currentFileName = "";

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        currentFileName = file.name;
        const reader = new FileReader();
        reader.onload = (content) => {
            const text = content.target.result;
            const chapterRegex = /(?=Chapter|บทที่|第[0-9一二三四五六七八九十百千]+[章节回]|\n{2,}(?=[^\n]{1,20}\n))/i;
            rawChapters = text.split(chapterRegex).filter(c => c.trim().length > 10);
            buildTOC();
            renderChapter(0);
        };
        reader.readAsText(file);
    });

    function renderChapter(index) {
        if (index < 0 || index >= rawChapters.length) return;
        currentChapterIndex = index;
        const display = document.getElementById('content-display');
        let lines = rawChapters[index].trim().split('\n');
        
        const sortedKeys = Object.keys(customDict).sort((a, b) => b.length - a.length);

        const html = lines.map((line, lineIdx) => {
            if(!line.trim()) return "";
            let originalLine = line.trim();
            let processedLine = originalLine;

            // แทนที่คำตาม Dictionary
            for (const oldWord of sortedKeys) {
                const regex = new RegExp(escapeRegExp(oldWord), 'g');
                processedLine = processedLine.replace(regex, customDict[oldWord]);
            }

            // จุดสำคัญ: เก็บข้อมูลจีนต้นฉบับไว้ใน attribute data-raw
            return `<p onclick="handleParaClick(event)" data-raw="${encodeURIComponent(originalLine)}">${processedLine}</p>`;
        }).join('');

        display.innerHTML = `<h2>บทที่ ${index + 1}</h2>` + html;
        window.scrollTo(0,0);
        updateTOCActiveState();
    }

    function handleParaClick(e) {
        const selection = window.getSelection();
        const selectedText = selection.toString().trim();
        if (!selectedText) return;

        const pTag = e.currentTarget;
        const rawText = decodeURIComponent(pTag.getAttribute('data-raw'));
        
        // 1. ถ้าสิ่งที่คลุมดำเป็นภาษาจีนอยู่แล้ว (ยังไม่ได้กดแปล) ให้ใช้ตัวนั้นเลย
        if (/[\u4E00-\u9FA5]/.test(selectedText)) {
            document.getElementById('originalWord').value = selectedText;
        } else {
            // 2. ถ้าเป็นภาษาไทย (แปลแล้ว) ให้พยายามหาคำจีนที่ "ใกล้เคียงตำแหน่งนั้น"
            // หรือแสดงประโยคจีนทั้งหมดเพื่อให้ผู้ใช้เลือกตัดคำได้ง่ายขึ้น
            // ในที่นี้จะดึงคำจีนที่คาดว่าจะเป็นต้นฉบับมาให้ในช่องเลย
            const thaiText = pTag.innerText;
            const offset = selection.anchorOffset;
            const ratio = offset / thaiText.length;
            const rawIndex = Math.floor(rawText.length * ratio);
            
            // สกัดคำจีนรอบๆ ตำแหน่งที่คลิก (ประมาณ 4 ตัวอักษร)
            const suggestion = rawText.substr(Math.max(0, rawIndex - 1), 4);
            document.getElementById('originalWord').value = suggestion || rawText.substring(0, 5);
        }

        document.getElementById('replaceWith').value = customDict[document.getElementById('originalWord').value] || "";
        document.getElementById('edit-modal').style.display = 'block';
    }

    function saveWord() {
        const oldW = document.getElementById('originalWord').value.trim();
        const newW = document.getElementById('replaceWith').value.trim();
        if (oldW && newW) {
            customDict[oldW] = newW;
            localStorage.setItem('novel_dict', JSON.stringify(customDict));
            closeModal('edit-modal');
            renderChapter(currentChapterIndex);
        }
    }

    // --- ส่วนเสริมคงเดิม ---
    function buildTOC() {
        const toc = document.getElementById('toc-menu');
        toc.innerHTML = '<h3>รายชื่อบท</h3>';
        rawChapters.forEach((ch, i) => {
            const d = document.createElement('div');
            d.className = 'toc-item';
            d.id = `toc-ch-${i}`;
            d.innerText = `${i + 1}. ${ch.substring(0, 20)}...`;
            d.onclick = () => { renderChapter(i); toggleTOC(); };
            toc.appendChild(d);
        });
    }

    function updateTOCActiveState() {
        document.querySelectorAll('.toc-item').forEach((item, idx) => {
            item.classList.toggle('active', idx === currentChapterIndex);
        });
    }

    function openDictModal() {
        const container = document.getElementById('dict-list-container');
        container.innerHTML = '';
        Object.keys(customDict).forEach(key => {
            const div = document.createElement('div');
            div.className = 'dict-item';
            div.innerHTML = `<b>${key}</b> ➡️ <input type="text" value="${customDict[key]}" onchange="updateDict('${key}', this.value)"> <button onclick="deleteDict('${key}')">✕</button>`;
            container.appendChild(div);
        });
        document.getElementById('dict-modal').style.display = 'block';
    }

    function updateDict(key, val) { customDict[key] = val; localStorage.setItem('novel_dict', JSON.stringify(customDict)); renderChapter(currentChapterIndex); }
    function deleteDict(key) { delete customDict[key]; localStorage.setItem('novel_dict', JSON.stringify(customDict)); openDictModal(); renderChapter(currentChapterIndex); }
    function clearDictionary() { if(confirm("ล้างทั้งหมด?")) { customDict = {}; localStorage.removeItem('novel_dict'); renderChapter(currentChapterIndex); } }
    function escapeRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function toggleTOC() { const m = document.getElementById('toc-menu'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
    function changeChapter(step) { renderChapter(currentChapterIndex + step); }
</script>
</body>
</html>
