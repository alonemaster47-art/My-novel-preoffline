<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Web Novel Reader</title>
    <style>
        :root {
            --bg-color: #f4f1ea; /* สีถนอมสายตา */
            --text-color: #2c3e50;
            --font-size: 20px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 2;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ส่วนควบคุม */
        #controls {
            position: fixed;
            top: 0;
            width: 100%;
            background: #fff;
            padding: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 100;
        }

        /* พื้นที่เนื้อหา */
        #reader-container {
            max-width: 800px;
            width: 90%;
            margin-top: 80px;
            margin-bottom: 50px;
            padding: 20px;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            min-height: 80vh;
        }

        h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; }
        p { margin-bottom: 1.5em; text-indent: 2em; }

        /* สารบัญ (Modal) */
        #toc-menu {
            position: fixed;
            right: 20px;
            top: 70px;
            background: white;
            border: 1px solid #ccc;
            max-height: 70vh;
            overflow-y: auto;
            width: 250px;
            display: none;
            padding: 10px;
            box-shadow: -2px 2px 10px rgba(0,0,0,0.1);
        }

        .toc-item { 
            cursor: pointer; 
            padding: 5px; 
            border-bottom: 1px solid #eee; 
        }
        .toc-item:hover { background: #f0f0f0; }

        button {
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 5px;
            border: 1px solid #ddd;
            background: #fff;
        }

        button:hover { background: #eee; }
    </style>
</head>
<body>

<div id="controls">
    <input type="file" id="fileInput" accept=".txt">
    <button onclick="toggleTOC()">📖 สารบัญ</button>
    <button onclick="changeChapter(-1)">ก่อนหน้า</button>
    <button onclick="changeChapter(1)">ถัดไป</button>
</div>

<div id="toc-menu"></div>

<div id="reader-container">
    <div id="content-display">
        <h1 style="text-align: center;">กรุณาเลือกไฟล์นิยาย (.txt)</h1>
        <p style="text-align: center;">ระบบจะแบ่งบทโดยหาจากคำว่า "Chapter", "บทที่" หรือการเว้นบรรทัดยาวๆ</p>
    </div>
</div>

<script>
    let chapters = [];
    let currentChapterIndex = 0;

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(content) {
            const text = content.target.result;
            processText(text);
        };
        reader.readAsText(file);
    });

    function processText(text) {
        // Regex สำหรับแบ่งบท (รองรับ Chapter, บทที่, หรือบรรทัดว่างหลายบรรทัด)
        const chapterRegex = /(?=Chapter|บทที่|\n{3,})/i;
        chapters = text.split(chapterRegex).filter(c => c.trim().length > 0);
        
        buildTOC();
        renderChapter(0);
    }

    function buildTOC() {
        const toc = document.getElementById('toc-menu');
        toc.innerHTML = '<h3>รายชื่อบท</h3>';
        chapters.forEach((ch, index) => {
            const title = ch.substring(0, 30).trim() + "...";
            const div = document.createElement('div');
            div.className = 'toc-item';
            div.innerText = `บทที่ ${index + 1}: ${title}`;
            div.onclick = () => {
                renderChapter(index);
                toggleTOC();
            };
            toc.appendChild(div);
        });
    }

    function renderChapter(index) {
        if (index < 0 || index >= chapters.length) return;
        currentChapterIndex = index;
        
        const display = document.getElementById('content-display');
        const text = chapters[index].trim();
        
        // แปลงบรรทัดใหม่เป็น <p> tag เพื่อให้ Browser Extension ตรวจจับและแปลได้ง่าย
        const formattedText = text.split('\n').map(line => {
            if(line.trim()) return `<p>${line.trim()}</p>`;
            return "";
        }).join('');

        display.innerHTML = `<h2>Chapter ${index + 1}</h2>` + formattedText;
        window.scrollTo(0,0);
    }

    function changeChapter(step) {
        renderChapter(currentChapterIndex + step);
    }

    function toggleTOC() {
        const toc = document.getElementById('toc-menu');
        toc.style.display = toc.style.display === 'block' ? 'none' : 'block';
    }
</script>

</body>
</html>
